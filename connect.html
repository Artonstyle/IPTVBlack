<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV BLACK - Remote Manager 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --green: #3ecf8e; --bg: #050505; --card: #141414; --input: #222; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .id-section { background: #000; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid var(--green); text-align: center; }
        .id-label { font-size: 11px; color: var(--green); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .mac-input-field { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; color: #fff; font-size: 26px; text-align: center; font-family: monospace; outline: none; }
        .tabs { display: flex; border-bottom: 2px solid #222; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: #666; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: var(--green); border-bottom: 2px solid var(--green); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: var(--input); color: #fff; box-sizing: border-box; font-size: 16px; outline: none; }
        .main-btn { width: 100%; padding: 18px; background: var(--green); color: #000; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 25px; text-transform: uppercase; }
        .progress-container { width: 100%; background: #000; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid #222; overflow: hidden; }
        .progress-bar { width: 0%; height: 8px; background: var(--green); transition: width 0.3s; }
    </style>
</head>
<body>

<div style="text-align:center; margin-bottom:30px;">
    <h1 style="color:var(--green); margin:0; letter-spacing:4px;">IPTV BLACK</h1>
    <p style="color:#555; font-size:12px;">DATABASE REMOTE SYNC 2026</p>
</div>

<div class="card">
    <div class="id-section">
        <span class="id-label">TV IDENTIFIKATION (MAC)</span>
        <input type="text" id="mac-field" class="mac-input-field" placeholder="00:00:00:00:00:00">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('xtream')">XTREAM</button>
        <button class="tab-btn" onclick="openTab('m3u')">M3U UPLOAD</button>
    </div>

    <div id="tab-xtream" class="tab-content active">
        <label>Playlist Name (z.B. "Mein TV")</label>
        <input type="text" id="xc_name_display" placeholder="Eigener Name für die Liste">
        <label>Server URL</label>
        <input type="text" id="xc_host" placeholder="http://domain.com:8080">
        <label>Username</label>
        <input type="text" id="xc_user">
        <label>Password</label>
        <input type="password" id="xc_pass">
        <button class="main-btn" onclick="saveData('xtream')">Speichern</button>
    </div>

    <div id="tab-m3u" class="tab-content">
        <label>Anzeigename im TV</label>
        <input type="text" id="m3u_name_display" placeholder="z.B. Sky Liste">
        
        <label style="margin-top:20px;">Datei wählen</label>
        <input type="file" id="m3u_file" accept=".m3u,.m3u8">
        
        <div class="progress-container" id="p-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        
        <button class="main-btn" onclick="saveData('m3u')">Hochladen & Senden</button>
    </div>
</div>

<script>
    const S_URL = "https://qqzrueigdqsqfsjzmzhv.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxenJ1ZWlnZHFzcWZzanptemh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNjczMDYsImV4cCI6MjA4Njg0MzMwNn0.V0v5cYENXJ3IxFxqQC9IlD5bQBD8runcgZdKJeVYhvA";
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) document.getElementById('mac-field').value = id.toUpperCase();
    };

    function openTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
    }

    async function saveData(mode) {
        const mac = document.getElementById('mac-field').value.trim().toUpperCase();
        if(!mac) return alert("MAC fehlt!");

        let payload = { mac: mac };
        const pBar = document.getElementById('p-bar');

        if(mode === 'm3u') {
            const fileInput = document.getElementById('m3u_file');
            const customName = document.getElementById('m3u_name_display').value;
            
            if(fileInput.files.length > 0) {
                document.getElementById('p-container').style.display = "block";
                const file = fileInput.files[0];
                const fileName = `${mac.replace(/:/g, '')}_${Date.now()}.m3u`;
                
                await supabaseClient.storage.from('m3u-files').upload(fileName, file, { upsert: true });
                pBar.style.width = "60%";
                
                const { data } = supabaseClient.storage.from('m3u-files').getPublicUrl(fileName);
                payload.m3u_url = data.publicUrl;
                // Wenn kein Name eingegeben wurde, nimm den echten Dateinamen
                payload.playlist_name = customName || file.name;
            }
        } else {
            payload.xc_host = document.getElementById('xc_host').value;
            payload.xc_user = document.getElementById('xc_user').value;
            payload.xc_pass = document.getElementById('xc_pass').value;
            payload.playlist_name = document.getElementById('xc_name_display').value || "Xtream Login";
        }

        const { error } = await supabaseClient.from('playlists').upsert(payload);
        if(!error) {
            pBar.style.width = "100%";
            alert("Erfolgreich! Dein TV zeigt nun '" + payload.playlist_name + "' an.");
        }
    }
</script>
</body>
</html>
