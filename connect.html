<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV BLACK - Remote Manager 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --neon: #00f0ff;
            --bg: #020617;
            --card: #0b1220;
            --input: #111827;
            --text: #e0f7ff;
            --muted: #7dd3fc;
            --line: rgba(0,240,255,0.22);
            --shadow: rgba(0,240,255,0.35);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #06142b, #020617 60%);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        .card {
            background: rgba(11, 18, 32, 0.88);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--line);
            box-shadow: 0 0 28px rgba(0,240,255,0.10), 0 0 10px rgba(0,240,255,0.08);
            backdrop-filter: blur(10px);
        }

        .id-section {
            background: rgba(5, 12, 26, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(0,240,255,0.7);
            box-shadow: 0 0 18px rgba(0,240,255,0.25);
            text-align: center;
        }

        .id-label {
            font-size: 11px;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .mac-input-field {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(0,240,255,0.35);
            color: var(--neon);
            font-size: 26px;
            text-align: center;
            font-family: monospace;
            outline: none;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid rgba(15, 23, 42, 0.9);
            margin-bottom: 25px;
            gap: 6px;
        }

        .tab-btn {
            flex: 1;
            padding: 14px 10px;
            background: transparent;
            border: 1px solid transparent;
            color: #3b82f6;
            cursor: pointer;
            font-weight: 800;
            border-radius: 12px 12px 0 0;
            transition: 0.25s;
        }

        .tab-btn:hover {
            color: var(--neon);
            text-shadow: 0 0 10px rgba(0,240,255,0.55);
        }

        .tab-btn.active {
            color: var(--neon);
            border: 1px solid var(--line);
            border-bottom: 2px solid var(--neon);
            text-shadow: 0 0 12px rgba(0,240,255,0.75);
            background: rgba(0,240,255,0.04);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        label {
            display: block;
            margin-top: 15px;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.6px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0,240,255,0.18);
            background: rgba(17, 24, 39, 0.92);
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: 0.25s;
        }

        input::placeholder { color: rgba(224,247,255,0.45); }

        input:focus {
            border-color: rgba(0,240,255,0.7);
            box-shadow: 0 0 14px rgba(0,240,255,0.25);
        }

        .main-btn {
            width: 100%;
            padding: 18px;
            background: var(--neon);
            color: #000;
            border: none;
            border-radius: 14px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            transition: 0.25s;
            box-shadow: 0 0 16px rgba(0,240,255,0.55);
        }

        .main-btn:hover {
            box-shadow: 0 0 28px rgba(0,240,255,0.85);
            transform: translateY(-2px);
        }

        .main-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 0 8px rgba(0,240,255,0.25);
        }

        .progress-container {
            width: 100%;
            background: rgba(0,0,0,0.55);
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            border: 1px solid rgba(0,240,255,0.25);
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 8px;
            background: linear-gradient(90deg, #00f0ff, #007bff);
            box-shadow: 0 0 10px rgba(0,240,255,0.7);
            transition: width 0.3s;
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand h1 {
            color: var(--neon);
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 14px rgba(0,240,255,0.55);
        }

        .brand p {
            color: rgba(224,247,255,0.35);
            font-size: 12px;
            margin: 6px 0 0 0;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="brand">
    <h1>IPTV BLACK</h1>
    <p>DATABASE REMOTE SYNC 2026</p>
</div>

<div class="card">
    <div class="id-section">
        <span class="id-label">TV IDENTIFIKATION (MAC)</span>
        <input type="text" id="mac-field" class="mac-input-field" placeholder="00:00:00:00:00:00">
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="xtream" onclick="openTab('xtream')">XTREAM</button>
        <button class="tab-btn" data-tab="m3u" onclick="openTab('m3u')">M3U UPLOAD</button>
        <button class="tab-btn" data-tab="m3uurl" onclick="openTab('m3uurl')">M3U URL</button>
    </div>

    <!-- XTREAM -->
    <div id="tab-xtream" class="tab-content active">
        <label>Playlist Name (z.B. "Mein TV")</label>
        <input type="text" id="xc_name_display" placeholder="Eigener Name für die Liste">

        <label>Server URL</label>
        <input type="text" id="xc_host" placeholder="http://domain.com:8080">

        <label>Username</label>
        <input type="text" id="xc_user" placeholder="Benutzername">

        <label>Password</label>
        <input type="password" id="xc_pass" placeholder="Passwort">

        <button class="main-btn" id="btn-xtream" onclick="saveData('xtream')">Laden &amp; Senden</button>
    </div>

    <!-- M3U UPLOAD -->
    <div id="tab-m3u" class="tab-content">
        <label>Anzeigename im TV</label>
        <input type="text" id="m3u_name_display" placeholder="z.B. Sky Liste">

        <label style="margin-top:20px;">Datei wählen</label>
        <input type="file" id="m3u_file" accept=".m3u,.m3u8">

        <div class="progress-container" id="p-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>

        <button class="main-btn" id="btn-m3u" onclick="saveData('m3u')">Hochladen &amp; Senden</button>
    </div>

    <!-- M3U URL -->
    <div id="tab-m3uurl" class="tab-content">
        <label>Anzeigename im TV</label>
        <input type="text" id="m3uurl_name_display" placeholder="z.B. Externe Liste">

        <label>M3U URL</label>
        <input type="text" id="m3uurl_link" placeholder="http://domain.com/playlist.m3u8">

        <button class="main-btn" id="btn-m3uurl" onclick="saveData('m3uurl')">Laden &amp; Senden</button>
    </div>
</div>

<script>
    const S_URL = "https://qqzrueigdqsqfsjzmzhv.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxenJ1ZWlnZHFzcWZzanptemh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNjczMDYsImV4cCI6MjA4Njg0MzMwNn0.V0v5cYENXJ3IxFxqQC9IlD5bQBD8runcgZdKJeVYhvA";
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    const BTN_LABELS = {
        xtream: { idle: "Laden & Senden", busy: "Bitte warten…", done: "Gesendet ✓" },
        m3u:    { idle: "Hochladen & Senden", busy: "Bitte warten…", done: "Gesendet ✓" },
        m3uurl: { idle: "Laden & Senden", busy: "Bitte warten…", done: "Gesendet ✓" }
    };

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) document.getElementById('mac-field').value = id.toUpperCase();
    };

    function openTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        const tab = document.getElementById('tab-' + name);
        if (tab) tab.classList.add('active');

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`.tab-btn[data-tab="${name}"]`);
        if (btn) btn.classList.add('active');

        // Progressbar nur beim Upload anzeigen (und resetten)
        const pc = document.getElementById('p-container');
        const pb = document.getElementById('p-bar');
        if (name !== 'm3u') {
            pc.style.display = "none";
            pb.style.width = "0%";
        }
    }

    function getMainButton(mode) {
        if (mode === 'xtream') return document.getElementById('btn-xtream');
        if (mode === 'm3u') return document.getElementById('btn-m3u');
        if (mode === 'm3uurl') return document.getElementById('btn-m3uurl');
        return null;
    }

    function setBtnState(mode, state) {
        const btn = getMainButton(mode);
        if (!btn) return;

        const labels = BTN_LABELS[mode] || { idle: "Senden", busy: "Bitte warten…", done: "OK" };

        if (state === 'busy') {
            btn.disabled = true;
            btn.innerHTML = labels.busy;
        } else if (state === 'done') {
            btn.disabled = true;
            btn.innerHTML = labels.done;
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = labels.idle;
            }, 1200);
        } else { // idle
            btn.disabled = false;
            btn.innerHTML = labels.idle;
        }
    }

    async function saveData(mode) {
        const mac = document.getElementById('mac-field').value.trim().toUpperCase();
        if(!mac) return alert("MAC fehlt!");

        let payload = { mac: mac };
        const pContainer = document.getElementById('p-container');
        const pBar = document.getElementById('p-bar');

        setBtnState(mode, 'busy');

        try {
            if(mode === 'm3u') {
                const fileInput = document.getElementById('m3u_file');
                const customName = document.getElementById('m3u_name_display').value.trim();

                if(fileInput.files.length === 0) {
                    setBtnState(mode, 'idle');
                    return alert("Bitte eine M3U Datei auswählen!");
                }

                pContainer.style.display = "block";
                pBar.style.width = "15%";

                const file = fileInput.files[0];
                const fileName = `${mac.replace(/:/g, '')}_${Date.now()}.m3u`;

                const uploadRes = await supabaseClient.storage.from('m3u-files').upload(fileName, file, { upsert: true });
                if (uploadRes.error) throw uploadRes.error;

                pBar.style.width = "60%";

                const { data } = supabaseClient.storage.from('m3u-files').getPublicUrl(fileName);
                payload.m3u_url = data.publicUrl;
                payload.playlist_name = customName || file.name;

            } else if (mode === 'm3uurl') {
                const url = document.getElementById('m3uurl_link').value.trim();
                const name = document.getElementById('m3uurl_name_display').value.trim();

                if(!url) {
                    setBtnState(mode, 'idle');
                    return alert("M3U URL fehlt!");
                }

                payload.m3u_url = url;
                payload.playlist_name = name || "M3U URL Playlist";

            } else { // xtream
                payload.xc_host = document.getElementById('xc_host').value.trim();
                payload.xc_user = document.getElementById('xc_user').value.trim();
                payload.xc_pass = document.getElementById('xc_pass').value;
                payload.playlist_name = document.getElementById('xc_name_display').value.trim() || "Xtream Login";
            }

            const { error } = await supabaseClient.from('playlists').upsert(payload);
            if(error) throw error;

            if(mode === 'm3u') pBar.style.width = "100%";

            setBtnState(mode, 'done');
            alert("Erfolgreich! Dein TV zeigt nun '" + payload.playlist_name + "' an.");
        } catch (e) {
            console.error(e);
            setBtnState(mode, 'idle');
            alert("Fehler: " + (e?.message || "Unbekannter Fehler"));
        }
    }
</script>

</body>
</html>
