<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV BLACK - Remote Manager 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --neon: #00f0ff;
            --bg: #020617;
            --card: #0b1220;
            --input: #111827;
            --text: #e0f7ff;
            --muted: #7dd3fc;
            --line: rgba(0,240,255,0.22);
            --shadow: rgba(0,240,255,0.35);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #06142b, #020617 60%);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        .card {
            background: rgba(11, 18, 32, 0.88);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--line);
            box-shadow: 0 0 28px rgba(0,240,255,0.10), 0 0 10px rgba(0,240,255,0.08);
            backdrop-filter: blur(10px);
        }

        .id-section {
            background: rgba(5, 12, 26, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(0,240,255,0.7);
            box-shadow: 0 0 18px rgba(0,240,255,0.25);
            text-align: center;
        }

        .id-label {
            font-size: 11px;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .mac-input-field {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(0,240,255,0.35);
            color: var(--neon);
            font-size: 26px;
            text-align: center;
            font-family: monospace;
            outline: none;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid rgba(15, 23, 42, 0.9);
            margin-bottom: 25px;
            gap: 6px;
        }

        .tab-btn {
            flex: 1;
            padding: 14px 10px;
            background: transparent;
            border: 1px solid transparent;
            color: #3b82f6;
            cursor: pointer;
            font-weight: 800;
            border-radius: 12px 12px 0 0;
            transition: 0.25s;
        }

        .tab-btn.active {
            color: var(--neon);
            border: 1px solid var(--line);
            border-bottom: 2px solid var(--neon);
            background: rgba(0,240,255,0.04);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        label {
            display: block;
            margin-top: 15px;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0,240,255,0.18);
            background: rgba(17, 24, 39, 0.92);
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        .main-btn {
            width: 100%;
            padding: 18px;
            background: var(--neon);
            color: #000;
            border: none;
            border-radius: 14px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            box-shadow: 0 0 16px rgba(0,240,255,0.55);
        }

        .xtream-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .sub-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: rgba(0,240,255,0.08);
            color: var(--neon);
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
        }

        .saved-list-box {
            margin-bottom: 18px;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(0,240,255,0.14);
            background: rgba(6, 20, 43, 0.55);
        }

        .saved-list-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .saved-list-actions .main-btn {
            margin-top: 0;
            padding: 13px;
            font-size: 13px;
        }

        .secondary-btn {
            background: transparent;
            color: var(--neon);
            border: 1px solid var(--line);
            box-shadow: none;
        }

        .password-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .password-row input {
            flex: 1;
        }

        .password-toggle-btn {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: rgba(0,240,255,0.08);
            color: var(--neon);
            font-size: 22px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .progress-container {
            width: 100%;
            background: rgba(0,0,0,0.55);
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 8px;
            background: linear-gradient(90deg, #00f0ff, #007bff);
        }

        .brand { text-align: center; margin-bottom: 30px; }
        .brand h1 { color: var(--neon); margin: 0; letter-spacing: 4px; }
    </style>
</head>
<body>

<div class="brand">
    <h1>IPTV BLACK</h1>
    <p>DATABASE REMOTE SYNC 2026</p>
</div>

<div class="card">
    <div class="id-section">
        <span class="id-label">TV IDENTIFIKATION (MAC)</span>
        <input type="text" id="mac-field" class="mac-input-field" placeholder="00:00:00:00:00:00">
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="xtream" onclick="openTab('xtream')">XTREAM</button>
        <button class="tab-btn" data-tab="m3u" onclick="openTab('m3u')">M3U UPLOAD</button>
        <button class="tab-btn" data-tab="m3uurl" onclick="openTab('m3uurl')">M3U URL</button>
    </div>

    <div id="tab-xtream" class="tab-content active">
        <div class="xtream-header">
            <span class="sub-label">Xtream Listen lokal speichern</span>
            <button class="icon-btn" type="button" onclick="createNewXtreamEntry()" title="Neue Xtream Liste">+</button>
        </div>
        <div class="saved-list-box">
            <label style="margin-top:0;">Gespeicherte Xtream Listen</label>
            <select id="xtream_saved_list" onchange="loadXtreamEntry(this.value)">
                <option value="">Keine gespeicherte Liste</option>
            </select>
            <div class="saved-list-actions">
                <button class="main-btn secondary-btn" type="button" onclick="saveCurrentXtreamEntry()">Lokal Speichern</button>
                <button class="main-btn secondary-btn" type="button" onclick="deleteCurrentXtreamEntry()">Liste L&ouml;schen</button>
            </div>
        </div>
        <label>Xtream Anzeigename</label>
        <input type="text" id="xc_name_display" placeholder="z.B. Mein Xtream Login">
        <label>Server URL</label>
        <input type="text" id="xc_host" placeholder="http://domain.com:8080">
        <label>Username</label>
        <input type="text" id="xc_user" placeholder="Benutzername">
        <label>Password</label>
        <div class="password-row">
            <input type="password" id="xc_pass" placeholder="Passwort">
            <button class="password-toggle-btn" type="button" id="xc_pass_toggle" onclick="toggleXtreamPassword()" title="Passwort anzeigen">👁</button>
        </div>
        <button class="main-btn" onclick="saveData('xtream')">Alle Xtream Listen Senden</button>
    </div>

    <div id="tab-m3u" class="tab-content">
        <label>M3U Datei Anzeigename</label>
        <input type="text" id="m3u_name_display" placeholder="z.B. Meine M3U Liste">
        <label style="margin-top:20px;">Datei wählen</label>
        <input type="file" id="m3u_file" accept=".m3u,.m3u8">
        <div class="progress-container" id="p-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <button class="main-btn" onclick="saveData('m3u')">Datei Hochladen</button>
    </div>

    <div id="tab-m3uurl" class="tab-content">
        <label>M3U URL Anzeigename</label>
        <input type="text" id="m3uurl_name_display" placeholder="z.B. Externe URL">
        <label>M3U URL</label>
        <input type="text" id="m3uurl_link" placeholder="http://domain.com/playlist.m3u8">
        <button class="main-btn" onclick="saveData('m3uurl')">URL Senden</button>
    </div>
</div>

<script>
    const S_URL = "https://qqzrueigdqsqfsjzmzhv.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxenJ1ZWlnZHFzcWZzanptemh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNjczMDYsImV4cCI6MjA4Njg0MzMwNn0.V0v5cYENXJ3IxFxqQC9IlD5bQBD8runcgZdKJeVYhvA";
    const supabaseClient = supabase.createClient(S_URL, S_KEY);
    const XTREAM_STORAGE_KEY = "iptv_black_xtream_lists";
    let currentXtreamEntryId = "";

    function getXtreamFormData() {
        return {
            name: document.getElementById('xc_name_display').value.trim(),
            host: document.getElementById('xc_host').value.trim(),
            user: document.getElementById('xc_user').value.trim(),
            pass: document.getElementById('xc_pass').value.trim()
        };
    }

    function setXtreamFormData(entry) {
        document.getElementById('xc_name_display').value = entry?.name || "";
        document.getElementById('xc_host').value = entry?.host || "";
        document.getElementById('xc_user').value = entry?.user || "";
        document.getElementById('xc_pass').value = entry?.pass || "";
    }

    function getStoredXtreamLists() {
        try {
            return JSON.parse(localStorage.getItem(XTREAM_STORAGE_KEY) || "[]");
        } catch (e) {
            return [];
        }
    }

    function saveStoredXtreamLists(lists) {
        localStorage.setItem(XTREAM_STORAGE_KEY, JSON.stringify(lists));
    }

    function renderXtreamSavedLists(selectedId = "") {
        const select = document.getElementById('xtream_saved_list');
        const lists = getStoredXtreamLists();
        select.innerHTML = '<option value="">Keine gespeicherte Liste</option>';

        lists.forEach((entry) => {
            const option = document.createElement('option');
            option.value = entry.id;
            option.textContent = entry.name || entry.host || entry.user || "Xtream Liste";
            select.appendChild(option);
        });

        if (selectedId && lists.some((entry) => entry.id === selectedId)) {
            select.value = selectedId;
            currentXtreamEntryId = selectedId;
            return;
        }

        select.value = "";
        currentXtreamEntryId = "";
    }

    function loadXtreamEntry(entryId) {
        const entry = getStoredXtreamLists().find((item) => item.id === entryId);
        currentXtreamEntryId = entryId || "";
        setXtreamFormData(entry || {});
    }

    function createNewXtreamEntry() {
        currentXtreamEntryId = "";
        document.getElementById('xtream_saved_list').value = "";
        setXtreamFormData({});
        setXtreamPasswordVisibility(false);
        document.getElementById('xc_name_display').focus();
    }

    function setXtreamPasswordVisibility(isVisible) {
        const passwordInput = document.getElementById('xc_pass');
        const toggleButton = document.getElementById('xc_pass_toggle');
        passwordInput.type = isVisible ? "text" : "password";
        toggleButton.textContent = isVisible ? "🙈" : "👁";
        toggleButton.title = isVisible ? "Passwort verbergen" : "Passwort anzeigen";
    }

    function toggleXtreamPassword() {
        const passwordInput = document.getElementById('xc_pass');
        setXtreamPasswordVisibility(passwordInput.type === "password");
    }

    function saveCurrentXtreamEntry() {
        const data = getXtreamFormData();
        if (!data.host || !data.user || !data.pass) {
            return alert("Bitte Host, Username und Passwort eingeben!");
        }

        const lists = getStoredXtreamLists();
        const entryId = currentXtreamEntryId || `xtream_${Date.now()}`;
        const entry = { id: entryId, ...data };
        const index = lists.findIndex((item) => item.id === entryId);

        if (index >= 0) {
            lists[index] = entry;
        } else {
            lists.push(entry);
        }

        saveStoredXtreamLists(lists);
        renderXtreamSavedLists(entryId);
        alert("Xtream Liste lokal gespeichert.");
    }

    function deleteCurrentXtreamEntry() {
        if (!currentXtreamEntryId) {
            return alert("Bitte zuerst eine gespeicherte Liste ausw&auml;hlen.");
        }

        const lists = getStoredXtreamLists().filter((item) => item.id !== currentXtreamEntryId);
        saveStoredXtreamLists(lists);
        createNewXtreamEntry();
        renderXtreamSavedLists();
        alert("Xtream Liste lokal gel&ouml;scht.");
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) document.getElementById('mac-field').value = id.toUpperCase();
        renderXtreamSavedLists();
    };

    function openTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active');
    }

    async function saveData(mode) {
        const mac = document.getElementById('mac-field').value.trim().toUpperCase();
        if(!mac) return alert("MAC fehlt!");

        // Payload Reset: Wir leeren alle Felder, damit nichts vom anderen Tab übrig bleibt
        let payload = { 
            mac: mac, 
            playlist_name: "", 
            m3u_url: null, 
            xc_host: null, 
            xc_user: null, 
            xc_pass: null 
        };

        try {
            if(mode === 'm3u') {
                const fileInput = document.getElementById('m3u_file');
                if(fileInput.files.length === 0) return alert("Datei wählen!");
                
                document.getElementById('p-container').style.display = "block";
                document.getElementById('p-bar').style.width = "30%";

                const file = fileInput.files[0];
                const fileName = `${mac.replace(/:/g, '')}_${Date.now()}.m3u`;
                const { error: upErr } = await supabaseClient.storage.from('m3u-files').upload(fileName, file);
                if (upErr) throw upErr;

                const { data } = supabaseClient.storage.from('m3u-files').getPublicUrl(fileName);
                payload.m3u_url = data.publicUrl;
                payload.playlist_name = document.getElementById('m3u_name_display').value.trim() || "M3U File";
                document.getElementById('p-bar').style.width = "100%";

            } else if (mode === 'm3uurl') {
                payload.m3u_url = document.getElementById('m3uurl_link').value.trim();
                payload.playlist_name = document.getElementById('m3uurl_name_display').value.trim() || "M3U URL";
                if(!payload.m3u_url) return alert("URL fehlt!");

            } else if (mode === 'xtream') {
                const savedXtreamLists = getStoredXtreamLists();
                if(savedXtreamLists.length === 0) return alert("Keine gespeicherte Xtream Liste gefunden!");

                const xtreamPayloads = savedXtreamLists.map((entry) => ({
                    mac: mac,
                    playlist_name: entry.name || "Xtream Login",
                    m3u_url: null,
                    xc_host: entry.host || null,
                    xc_user: entry.user || null,
                    xc_pass: entry.pass || null
                }));

                const { error } = await supabaseClient.from('playlists').insert(xtreamPayloads);
                if(error) throw error;

                alert(`${xtreamPayloads.length} Xtream Liste(n) erfolgreich gesendet.`);
                return;
            }

            const { error } = await supabaseClient.from('playlists').upsert(payload);
            if(error) throw error;

            alert("Erfolgreich gesendet: " + payload.playlist_name);
        } catch (e) {
            alert("Fehler: " + e.message);
        }
    }
</script>
</body>
</html>
